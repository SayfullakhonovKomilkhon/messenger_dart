name: messenger
description: "Demos-style messenger app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0
  stomp_dart_client: ^2.0.0
  web_socket_channel: ^3.0.2

  # WebRTC
  flutter_webrtc: ^0.12.7

  # Navigation
  go_router: ^14.8.1

  # Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # UI
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  intl: ^0.19.0
  shimmer: ^3.0.0
  flutter_sound: ^9.16.3
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  uuid: ^4.5.1

  # Firebase
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
