name: messenger
description: "Demos-style messenger app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0
  stomp_dart_client: ^2.0.0
  web_socket_channel: ^3.0.2

  # WebRTC
  flutter_webrtc: ^0.12.7

  # Navigation
  go_router: ^14.8.1

  # Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # UI
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  video_player: ^2.9.2
  file_picker: ^8.1.7
  intl: ^0.20.2
  shimmer: ^3.0.0
  flutter_sound: ^9.16.3
  audio_session: ^0.1.21
  permission_handler: ^11.3.1
  app_settings: ^7.0.0
  local_auth: ^2.3.0
  path_provider: ^2.1.5
  uuid: ^4.5.1

  # Link preview
  any_link_preview: ^3.0.3
  url_launcher: ^6.3.1

  # E2EE / Crypto
  libsignal_protocol_dart: ^0.7.4
  cryptography: ^2.7.0

  # Firebase
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#0A0E2A"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Magneto
      fonts:
        - asset: assets/fonts/Magneto-Bold.ttf
          weight: 700
